version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: job_hunter_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jobhunterpass
      POSTGRES_DB: ai_job_hunter
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - job_hunter_network

  redis:
    image: redis:7-alpine
    container_name: job_hunter_redis
    networks:
      - job_hunter_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job_hunter_backend
    ports:
      - "8001:8000"
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=jobhunterpass
      - POSTGRES_DB=ai_job_hunter
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    networks:
      - job_hunter_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: job_hunter_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - job_hunter_network

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: job_hunter_n8n
    ports:
      - "9005:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - job_hunter_network

volumes:
  pgdata:
  n8n_data:


networks:
  job_hunter_network:
    name: job_hunter_network
